name: build-windows

on:
  # Manual trigger — you can hit "Run workflow" from the Actions tab.
  workflow_dispatch:
  # Build on every push to the feature branch so the latest bits are always
  # available to download as an Actions artifact.
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

# Need write permission on the repo so the final step can commit the built
# artifacts to the `builds` branch.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run unit tests
        run: python -m pytest -q

      - name: Build PyInstaller onedir app
        run: python build\build_windows.py

      - name: Smoke-test the built .exe (import check)
        shell: pwsh
        run: |
          $exe = "dist\DuplicatorSearchDestroy\DuplicatorSearchDestroy.exe"
          if (-not (Test-Path $exe)) { throw "Build did not produce $exe" }
          # Launch with --help so the binary exits immediately but still
          # initialises every import (cryptography, smbprotocol, PySide6, etc.).
          # This catches the "no module named ..." class of bugs at build time.
          $p = Start-Process -FilePath $exe -ArgumentList "--help" -PassThru -NoNewWindow -RedirectStandardOutput help.txt -RedirectStandardError err.txt
          if (-not $p.WaitForExit(30000)) {
            $p.Kill()
            throw "DuplicatorSearchDestroy.exe --help timed out — likely a silent import failure."
          }
          Get-Content help.txt
          if ($p.ExitCode -ne 0) {
            Get-Content err.txt
            throw "DuplicatorSearchDestroy.exe --help exited with code $($p.ExitCode)"
          }

      - name: Zip the onedir build
        shell: pwsh
        run: |
          $zip = "dist\DuplicatorSearchDestroy-windows-x64.zip"
          Compress-Archive -Path "dist\DuplicatorSearchDestroy\*" -DestinationPath $zip
          Get-Item $zip | Format-List Length,FullName

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          New-Item -ItemType Directory -Force -Path dist\installer | Out-Null
          & $iscc build\installer.iss
          Get-ChildItem dist\installer\*.exe | Format-List Length,FullName

      - name: Upload onedir zip
        uses: actions/upload-artifact@v4
        with:
          name: DuplicatorSearchDestroy-windows-x64
          path: dist/DuplicatorSearchDestroy-windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DuplicatorSearchDestroy-installer
          path: dist/installer/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach artifacts to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DuplicatorSearchDestroy-windows-x64.zip
            dist/installer/*.exe
          generate_release_notes: true

      # -----------------------------------------------------------------
      #  Publish artifacts *into* the repo on the `builds` branch so they
      #  show up in the GitHub file tree without bloating main/feature
      #  history. The branch is a single-commit rolling history: each
      #  successful build fast-forwards over the previous one, so the
      #  `.git` folder never accumulates old binary versions.
      # -----------------------------------------------------------------
      - name: Commit artifacts to `builds` branch
        if: success() && github.event_name != 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"

          # Stage the artifacts in a temp location before we rewrite the tree.
          $staging = Join-Path $env:RUNNER_TEMP "artifacts"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "dist\DuplicatorSearchDestroy-windows-x64.zip" $staging
          Get-ChildItem "dist\installer\*.exe" | ForEach-Object {
            Copy-Item $_.FullName $staging
          }

          # Prepare a fresh worktree on an orphan `builds` branch. Using an
          # orphan means no shared history with main → no bloat carried over.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $buildsDir = Join-Path $env:RUNNER_TEMP "builds-worktree"
          if (Test-Path $buildsDir) { Remove-Item -Recurse -Force $buildsDir }
          git worktree add --detach $buildsDir

          Push-Location $buildsDir
          try {
            git checkout --orphan builds
            git rm -rf . 2>$null | Out-Null
            Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force

            # Layout inside the `builds` branch:
            #   releases/windows-x64/DuplicatorSearchDestroy-windows-x64.zip
            #   releases/windows-x64/DuplicatorSearchDestroy-Setup-<version>.exe
            #   releases/windows-x64/BUILD_INFO.txt
            New-Item -ItemType Directory -Force -Path "releases\windows-x64" | Out-Null
            Copy-Item "$staging\*" "releases\windows-x64\"

            $info = @"
            Build source commit: $env:SOURCE_SHA
            Build source branch: $env:SOURCE_REF
            Build timestamp:     $(Get-Date -Format 'o')
            Workflow run:        https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID

            Contents:
              DuplicatorSearchDestroy-windows-x64.zip   portable PyInstaller --onedir build
              DuplicatorSearchDestroy-Setup-*.exe       Inno Setup installer
            "@
            Set-Content -Path "releases\windows-x64\BUILD_INFO.txt" -Value $info

            @"
            # Built binaries

            This branch contains ONLY pre-built Windows binaries. Source code lives on
            main and feature branches — do not edit files here by hand; they are
            overwritten on every successful build.

            Latest build: ``$env:SOURCE_REF`` @ ``$env:SOURCE_SHA``
            "@ | Set-Content -Path "README.md"

            git add -A
            git commit -m "Windows build from $env:SOURCE_REF @ $($env:SOURCE_SHA.Substring(0,8))"

            # Force-push: builds branch is a single-commit rolling pointer, no
            # history to preserve.
            git push --force origin builds
          } finally {
            Pop-Location
            git worktree remove --force $buildsDir
          }

