name: build-windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run unit tests
        run: python -m pytest -q

      - name: Build PyInstaller onedir app
        run: python build\build_windows.py

      # --------------------------------------------------------------
      #  Smoke test: run the built .exe with --selftest so it imports
      #  every bundled module (cryptography, smbprotocol, PySide6, …)
      #  and returns 0 without launching a GUI. --help can't be used on
      #  a --windowed build because sys.stdout is None, so argparse
      #  crashes when it tries to print.
      # --------------------------------------------------------------
      - name: Smoke-test the built .exe
        shell: pwsh
        run: |
          $exe = "dist\DuplicatorSearchDestroy\DuplicatorSearchDestroy.exe"
          if (-not (Test-Path $exe)) { throw "Build did not produce $exe" }
          # Use a finite wait: if the bootloader pops an error MessageBox
          # on a broken bundle it would otherwise hang the job until the
          # default 6h timeout.
          $p = Start-Process -FilePath $exe -ArgumentList "--selftest" -PassThru -NoNewWindow
          $ok = $p.WaitForExit(60000)
          if (-not $ok) {
            try { $p.Kill() } catch {}
            throw "Selftest timed out after 60s. Likely a bundle crash showing a modal MessageBox."
          }
          if ($p.ExitCode -ne 0) {
            throw "Selftest failed with exit code $($p.ExitCode) — a bundled module is broken."
          }
          Write-Host "[OK] Selftest passed."

      - name: Zip the onedir build
        shell: pwsh
        run: |
          $zip = "dist\DuplicatorSearchDestroy-windows-x64.zip"
          Compress-Archive -Path "dist\DuplicatorSearchDestroy\*" -DestinationPath $zip
          Get-Item $zip | Format-List Length,FullName

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          New-Item -ItemType Directory -Force -Path dist\installer | Out-Null
          & $iscc build\installer.iss
          Get-ChildItem dist\installer\*.exe | Format-List Length,FullName

      - name: Upload onedir zip
        uses: actions/upload-artifact@v4
        with:
          name: DuplicatorSearchDestroy-windows-x64
          path: dist/DuplicatorSearchDestroy-windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DuplicatorSearchDestroy-installer
          path: dist/installer/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach artifacts to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DuplicatorSearchDestroy-windows-x64.zip
            dist/installer/*.exe
          generate_release_notes: true

      # --------------------------------------------------------------
      #  Publish artifacts into the repo on the `builds` branch so they
      #  show up in the GitHub file tree. The branch is a single-commit
      #  orphan that gets force-pushed each run, so the repo never
      #  accumulates old binary revisions.
      # --------------------------------------------------------------
      - name: Commit artifacts to `builds` branch
        if: success() && github.event_name != 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"

          # Stage the artifacts in a temp location before we rewrite the tree.
          $staging = Join-Path $env:RUNNER_TEMP "artifacts"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "dist\DuplicatorSearchDestroy-windows-x64.zip" $staging
          Get-ChildItem "dist\installer\*.exe" | ForEach-Object {
            Copy-Item $_.FullName $staging
          }

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $buildsDir = Join-Path $env:RUNNER_TEMP "builds-worktree"
          if (Test-Path $buildsDir) { Remove-Item -Recurse -Force $buildsDir }
          git worktree add --detach $buildsDir

          Push-Location $buildsDir
          try {
            git checkout --orphan builds
            git rm -rf . 2>$null | Out-Null
            Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force

            New-Item -ItemType Directory -Force -Path "releases\windows-x64" | Out-Null
            Copy-Item "$staging\*" "releases\windows-x64\"

            # Build BUILD_INFO.txt as a plain string (PowerShell here-strings
            # are fragile under YAML indentation — the closing "@ has to be
            # at column 0).
            $buildInfo = "Build source commit: $env:SOURCE_SHA`r`n"
            $buildInfo += "Build source branch: $env:SOURCE_REF`r`n"
            $buildInfo += "Build timestamp:     $(Get-Date -Format 'o')`r`n"
            $buildInfo += "Workflow run:        https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID`r`n`r`n"
            $buildInfo += "Contents:`r`n"
            $buildInfo += "  DuplicatorSearchDestroy-windows-x64.zip   portable PyInstaller --onedir build`r`n"
            $buildInfo += "  DuplicatorSearchDestroy-Setup-*.exe       Inno Setup installer`r`n"
            Set-Content -Path "releases\windows-x64\BUILD_INFO.txt" -Value $buildInfo -Encoding utf8

            $shortSha = $env:SOURCE_SHA.Substring(0, 8)
            $readme = "# Built binaries`r`n`r`n"
            $readme += "This branch contains ONLY pre-built Windows binaries. Source code`r`n"
            $readme += "lives on main and feature branches -- do not edit files here by hand;`r`n"
            $readme += "they are overwritten on every successful build.`r`n`r`n"
            $readme += "Latest build: ``$env:SOURCE_REF`` @ ``$shortSha```r`n`r`n"
            $readme += "Download from: releases/windows-x64/`r`n"
            Set-Content -Path "README.md" -Value $readme -Encoding utf8

            git add -A
            git commit -m "Windows build from $env:SOURCE_REF @ $shortSha"
            git push --force origin builds
          } finally {
            Pop-Location
            git worktree remove --force $buildsDir
          }
